<title>Banana Daydream — Clouds v4</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    overflow: hidden;
    width: 100%;
    height: 100%;
  }

  .bd-bg {
    position: relative;
    width: 100%;
    min-height: 100vh;
    background: linear-gradient(
      180deg,
      #6AAECF 0%,
      #7ABBD5 12%,
      #92C4DA 25%,
      #BFDAE8 38%,
      #D3E5E8 50%,
      #E8EDD8 60%,
      #F0E8B8 70%,
      #F5E090 82%,
      #F8D870 91%,
      #FAD060 100%
    );
    overflow: hidden;
  }

  /* subtle noise */
  .bd-bg::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
    background-size: 200px;
    pointer-events: none;
    z-index: 0;
  }

  /* Clouds */
  .bd-clouds {
    position: absolute;
    inset: 0;
    z-index: 1;
    pointer-events: none;
  }

  .bd-cloud {
    position: absolute;
    opacity: 0;
    animation: bdDriftCloud linear infinite;
  }

  @keyframes bdDriftCloud {
    0%   { transform: translateX(-320px) translateY(0px);                opacity: 0;    }
    6%   { opacity: 1; }
    88%  { opacity: 1; }
    100% { transform: translateX(calc(100vw + 320px)) translateY(-15px); opacity: 0;    }
  }



  /* Content sits above */
  .bd-content {
    position: relative;
    z-index: 10;
  }

  /* Preview label */
  .preview-label {
    position: fixed;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.5);
    color: #fff;
    font-family: sans-serif;
    font-size: 12px;
    padding: 6px 14px;
    border-radius: 100px;
    pointer-events: none;
    z-index: 999;
    letter-spacing: 0.05em;
  }
</style>
</head>
<body>

<div class="bd-bg">
  <div class="bd-clouds" id="bdClouds"></div>
  <div class="bd-content"></div>
</div>

const cloudConfigs = [
  { top: '2%',  w: 280, dur: 55, delay: 0,    opac: 0.75 },
  { top: '8%',  w: 380, dur: 62, delay: -18,  opac: 0.75 },
  { top: '16%', w: 210, dur: 44, delay: -8,   opac: 0.75 },
  { top: '24%', w: 320, dur: 52, delay: -30,  opac: 0.75 },
  { top: '35%', w: 440, dur: 68, delay: -12,  opac: 0.75 },
  { top: '44%', w: 290, dur: 50, delay: -40,  opac: 0.75 },
  { top: '52%', w: 360, dur: 58, delay: -25,  opac: 0.75 },
  { top: '62%', w: 520, dur: 75, delay: -20,  opac: 0.75 },
  { top: '68%', w: 460, dur: 80, delay: -55,  opac: 0.75 },

  { top: '90%', w: 560, dur: 85, delay: -45,  opac: 0.75 },
];

const cloudsEl = document.getElementById('bdClouds');
cloudConfigs.forEach((c, i) => {
  const el = document.createElement('div');
  el.className = 'bd-cloud';
  el.style.top = c.top;
  el.style.animationDuration = c.dur + 's';
  el.style.animationDelay = c.delay + 's';
  // Slight vertical variation per cloud
  const yOffset = (Math.random() - 0.5) * 30;
  el.style.marginTop = yOffset + 'px';

  const img = document.createElement('img');
  img.src = CLOUD_SRCS[i % CLOUD_SRCS.length];
  img.style.width = c.w + 'px';
  img.style.opacity = c.opac;
  img.style.display = 'block';
  el.appendChild(img);
  cloudsEl.appendChild(el);
});
